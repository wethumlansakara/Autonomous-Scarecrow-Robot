# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-app/robot-dashboard/package-lock.json
      - run: npm ci
        working-directory: web-app/robot-dashboard
      - run: npm run build
        working-directory: web-app/robot-dashboard
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AUTONOMOUS_SCARECROW_ROBOT }}
          channelId: live
          projectId: autonomous-scarecrow-robot
          entryPoint: ./web-app/robot-dashboard
